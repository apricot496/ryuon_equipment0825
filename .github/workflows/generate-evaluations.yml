name: Generate Equipment Evaluations

on:
  workflow_dispatch:  # 手動実行
  workflow_run:  # reload-db完了後に自動実行
    workflows: ["Reload Sheets to DB"]
    types:
      - completed

jobs:
  generate-evaluations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Rebase onto latest branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git pull --rebase origin "$branch"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements-gha.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Generate evaluation files for latest 10 equipments
        run: python generate_evaluations_for_github_action.py

      - name: Check generated files
        run: |
          echo "Generated HTML files:"
          ls -lh evaluation_sheets/*.html | tail -20 || true
          echo ""
          echo "Generated PNG files:"
          ls -lh evaluation_sheets/images/*.png | tail -20 || true

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add evaluation_sheets/
          git add equipments_mart_score.db
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: Generate equipment evaluations for latest 10 items [skip ci]"
            
            branch="${GITHUB_REF#refs/heads/}"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
            git push origin "$branch"
          fi
